<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1ea0ff"/>
      <stop offset="100%" style="stop-color:#00e5cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.6"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1ea0ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Inner hexagon -->
  <polygon points="256,140 356,200 356,312 256,372 156,312 156,200" 
           fill="none" stroke="url(#accent)" stroke-width="6"/>
  
  <!-- Alpha-1 text -->
  <text x="256" y="235" text-anchor="middle" font-family="Orbitron, monospace" 
        font-size="72" font-weight="900" fill="#f5d020">α1</text>
  
  <!-- Status dots -->
  <circle cx="200" cy="290" r="12" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="290" r="12" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="312" cy="290" r="12" fill="#00e5cc">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Corner accents -->
  <path d="M60,60 L120,60 L120,70 M60,60 L60,120" stroke="#1ea0ff" stroke-width="3" fill="none"/>
  <path d="M452,60 L392,60 L392,70 M452,60 L452,120" stroke="#1ea0ff" stroke-width="3" fill="none"/>
  <path d="M60,452 L120,452 L120,442 M60,452 L60,392" stroke="#1ea0ff" stroke-width="3" fill="none"/>
  <path d="M452,452 L392,452 L392,442 M452,452 L452,392" stroke="#1ea0ff" stroke-width="3" fill="none"/>
</svg>